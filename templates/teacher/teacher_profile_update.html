{% extends "base.html" %}

{% block title %}Update Profile{% endblock %}

{% block content %}
<h2>Update Teacher Profile</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Changes</button>
</form>

<p><a href="{% url 'teacher_dashboard' %}">Back to Dashboard</a></p>
{% endblock %}
